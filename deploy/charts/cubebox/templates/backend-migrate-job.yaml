apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cubebox.backend.fullname" . }}-migrate
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        {{- include "cubebox.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "cubebox.backend.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.production.local.yaml
              subPath: config.production.local.yaml
            - name: secrets
              mountPath: /app/config.production.secrets.yaml
              subPath: config.production.secrets.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "cubebox.backend.fullname" . }}-config
        - name: secrets
          secret:
            secretName: {{ include "cubebox.backend.fullname" . }}-secrets
