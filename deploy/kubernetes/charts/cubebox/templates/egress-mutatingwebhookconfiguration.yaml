{{- if .Values.egress.enabled -}}
{{- $certs := include "cubebox.egress.certs" . | fromJson -}}
{{- $sandboxNs := .Values.egress.sandboxNamespace -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  # Cluster-scoped — keep the release identity in the name so multiple
  # cubebox installs in the same cluster don't collide.
  name: {{ printf "%s-egress-inject" .Release.Name | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-webhook-config
webhooks:
  - name: egress-inject.cubebox.io
    namespaceSelector:
      {{- if .Values.egress.webhook.namespaceSelector }}
      {{- toYaml .Values.egress.webhook.namespaceSelector | nindent 6 }}
      {{- else }}
      matchLabels:
        kubernetes.io/metadata.name: {{ $sandboxNs | quote }}
      {{- end }}
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    # failurePolicy: Ignore — a webhook outage must not block pod creation.
    # Affected sandboxes start without secret injection (the cbxref_<id>
    # placeholder remains literal in egress traffic) but the cluster keeps
    # running. Alert on webhook errors separately.
    failurePolicy: Ignore
    clientConfig:
      service:
        name: {{ include "cubebox.egress.webhookFullname" . | quote }}
        namespace: {{ .Release.Namespace | quote }}
        path: /mutate
        port: 443
      # CA bundle that signed the webhook's serving cert (the chart's
      # template-time-generated CA, persisted in the mitm-ca Secret).
      caBundle: {{ $certs.CACert | b64enc | quote }}
    sideEffects: NoneOnDryRun
    admissionReviewVersions: ["v1"]
    matchPolicy: Equivalent
    timeoutSeconds: 10
{{- end -}}
