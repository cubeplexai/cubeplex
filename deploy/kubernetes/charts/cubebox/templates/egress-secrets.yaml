{{- if .Values.egress.enabled -}}
{{- $certs := include "cubebox.egress.certs" . | fromJson -}}
{{- $sandboxNs := .Values.egress.sandboxNamespace -}}
{{- $caName := printf "%s-mitm-ca" (include "cubebox.egress.fullname" .) -}}
{{- $whName := printf "%s-tls" (include "cubebox.egress.webhookFullname" .) -}}
{{- $bName  := printf "%s-mtls" (include "cubebox.backend.fullname" .) -}}
---
# Long-lived MITM CA in the CUBEBOX namespace — the authoritative source
# of truth, never rotated. `helm.sh/resource-policy: keep` keeps it across
# upgrades AND `helm uninstall`.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $caName | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-ca
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  mitmproxy-ca.pem:      {{ $certs.CAKey  | b64enc | quote }}
  mitmproxy-ca-cert.pem: {{ $certs.CACert | b64enc | quote }}
  # Same CA also signs the exchange server cert; expose it under the
  # historical name so the per-sandbox client Secret (minted by the
  # webhook) carries an exchange-ca.pem that inject.py can pin.
  ca-cert.pem:           {{ $certs.CACert | b64enc | quote }}
---
# Mirror of the MITM CA in the SANDBOX namespace. Sandbox pods mount this
# Secret via the JSON patch emitted by the webhook (which hard-codes the
# `egress-mitm-ca` name). Same content as the cubebox-ns Secret — they
# both render from the same `cubebox.egress.certs` helper.
apiVersion: v1
kind: Secret
metadata:
  name: "egress-mitm-ca"
  namespace: {{ $sandboxNs | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-ca
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  mitmproxy-ca.pem:      {{ $certs.CAKey  | b64enc | quote }}
  mitmproxy-ca-cert.pem: {{ $certs.CACert | b64enc | quote }}
  ca-cert.pem:           {{ $certs.CACert | b64enc | quote }}
---
# Webhook HTTPS serving cert (consumed by the webhook Deployment AND by
# the MutatingWebhookConfiguration's caBundle).
apiVersion: v1
kind: Secret
metadata:
  name: {{ $whName | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-webhook-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ $certs.WebhookCertPem | b64enc | quote }}
  tls.key: {{ $certs.WebhookKeyPem  | b64enc | quote }}
  ca.crt:  {{ $certs.CACert         | b64enc | quote }}
---
# Backend mTLS listener server cert + key + trust CA. Mounted at
# /etc/egress/ on the backend pod; dynaconf reads the paths via the
# backend ConfigMap (egress_exchange.listener.{certfile,keyfile,ca_certs}).
apiVersion: v1
kind: Secret
metadata:
  name: {{ $bName | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-exchange-mtls
type: kubernetes.io/tls
data:
  tls.crt: {{ $certs.ServerCertPem | b64enc | quote }}
  tls.key: {{ $certs.ServerKeyPem  | b64enc | quote }}
  ca.crt:  {{ $certs.CACert        | b64enc | quote }}
{{- end -}}
