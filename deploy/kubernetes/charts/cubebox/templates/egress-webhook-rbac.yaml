{{- if .Values.egress.enabled -}}
{{- $sandboxNs := required "egress.sandboxNamespace is required when egress.enabled" .Values.egress.sandboxNamespace -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cubebox.egress.webhookFullname" . | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-webhook
---
# Webhook needs to create + refresh per-sandbox client-cert Secrets IN THE
# SANDBOX NAMESPACE (not the cubebox namespace where it itself runs). A
# ClusterRole + RoleBinding scoped to the sandbox ns gives least-privilege
# while letting us move the webhook freely across namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cubebox.egress.webhookFullname" . | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-webhook
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch"]
---
# RoleBinding in the SANDBOX namespace — webhook can mutate Secrets there
# only.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cubebox.egress.webhookFullname" . | quote }}
  namespace: {{ $sandboxNs | quote }}
  labels:
    {{- include "cubebox.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-webhook
subjects:
  - kind: ServiceAccount
    name: {{ include "cubebox.egress.webhookFullname" . | quote }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  kind: ClusterRole
  name: {{ include "cubebox.egress.webhookFullname" . | quote }}
  apiGroup: rbac.authorization.k8s.io
{{- end -}}
