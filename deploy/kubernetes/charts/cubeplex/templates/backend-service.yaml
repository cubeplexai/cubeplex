apiVersion: v1
kind: Service
metadata:
  name: {{ include "cubeplex.backend.fullname" . }}
  labels:
    {{- include "cubeplex.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.egress.enabled }}
    - name: mtls
      port: 8443
      targetPort: mtls
      protocol: TCP
    {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "cubeplex.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
