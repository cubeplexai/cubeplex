{{- if .Values.egress.enabled -}}
{{- $egressImage := required "egress.webhook.egressImage is required when egress.enabled (must match opensandbox-server's egress.image)" .Values.egress.webhook.egressImage -}}
{{- $exchangeURL := default
    (printf "https://%s.%s.svc.cluster.local:8443/api/v1/internal/egress/exchange"
      (include "cubeplex.backend.fullname" .) .Release.Namespace)
    .Values.egress.webhook.exchangeURL -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cubeplex.egress.webhookFullname" . | quote }}
  labels:
    {{- include "cubeplex.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-webhook
spec:
  replicas: {{ .Values.egress.webhook.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cubeplex.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: egress-webhook
  template:
    metadata:
      labels:
        {{- include "cubeplex.labels" . | nindent 8 }}
        app.kubernetes.io/component: egress-webhook
    spec:
      serviceAccountName: {{ include "cubeplex.egress.webhookFullname" . | quote }}
      containers:
        - name: webhook
          image: {{ include "cubeplex.egress.webhook.image" . | quote }}
          imagePullPolicy: {{ .Values.egress.webhook.image.pullPolicy | default .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: EGRESS_IMAGE
              value: {{ $egressImage | quote }}
            - name: EGRESS_EXCHANGE_URL
              value: {{ $exchangeURL | quote }}
            - name: CLIENT_CERT_TTL_MINUTES
              value: {{ .Values.egress.webhook.clientCertTTLMinutes | quote }}
            - name: CA_KEY_PATH
              value: "/etc/egress-mitm-ca/mitmproxy-ca.pem"
            - name: CA_CERT_PATH
              value: "/etc/egress-mitm-ca/mitmproxy-ca-cert.pem"
            - name: EXCHANGE_CA_PATH
              value: "/etc/egress-mitm-ca/ca-cert.pem"
          args:
            - uvicorn
            - webhook.app:app
            - --host=0.0.0.0
            - --port=8443
            - --ssl-certfile=/etc/webhook-tls/tls.crt
            - --ssl-keyfile=/etc/webhook-tls/tls.key
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.egress.webhook.resources | nindent 12 }}
          volumeMounts:
            - name: mitm-ca
              mountPath: /etc/egress-mitm-ca
              readOnly: true
            - name: webhook-tls
              mountPath: /etc/webhook-tls
              readOnly: true
      volumes:
        - name: mitm-ca
          secret:
            secretName: {{ printf "%s-mitm-ca" (include "cubeplex.egress.fullname" .) | quote }}
        - name: webhook-tls
          secret:
            secretName: {{ printf "%s-tls" (include "cubeplex.egress.webhookFullname" .) | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cubeplex.egress.webhookFullname" . | quote }}
  labels:
    {{- include "cubeplex.labels" . | nindent 4 }}
    app.kubernetes.io/component: egress-webhook
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "cubeplex.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: egress-webhook
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
{{- end -}}
