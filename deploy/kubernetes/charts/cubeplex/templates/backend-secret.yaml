{{- $jwt := required "backend.secrets.auth.jwt_secret must be set in values.local.yaml" .Values.backend.secrets.auth.jwt_secret -}}
{{- $csrf := required "backend.secrets.auth.csrf_secret must be set in values.local.yaml" .Values.backend.secrets.auth.csrf_secret -}}
{{- $vault := required "backend.secrets.auth.vault_key must be set in values.local.yaml (Fernet key)" .Values.backend.secrets.auth.vault_key -}}
{{- $pgPass := required "postgres.auth.password must be set in values.local.yaml" .Values.postgres.auth.password -}}
{{- $redisPass := required "redis.auth.password must be set in values.local.yaml" .Values.redis.auth.password -}}
{{- $rustfsAccessKey := .Values.rustfs.auth.accessKey -}}
{{- $rustfsSecretKey := required "rustfs.auth.secretKey must be set in values.local.yaml" .Values.rustfs.auth.secretKey -}}
{{- $sandbox := .Values.backend.secrets.sandbox -}}
{{- $llm := .Values.backend.secrets.llm -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cubeplex.backend.fullname" . }}-secrets
  labels:
    {{- include "cubeplex.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.production.secrets.yaml: |
    dynaconf_merge: true
    production:
      auth:
        jwt_secret: {{ $jwt | quote }}
        csrf_secret: {{ $csrf | quote }}
        vault_key: {{ $vault | quote }}
      database:
        password: {{ $pgPass | quote }}
      redis:
        url: {{ printf "redis://:%s@%s:6379/0" $redisPass (include "cubeplex.redis.host" .) | quote }}
      objectstore:
        access_key: {{ $rustfsAccessKey | quote }}
        access_secret: {{ $rustfsSecretKey | quote }}
      sandbox:
        domain: {{ $sandbox.domain | quote }}
        image: {{ $sandbox.image | default (printf "%s/%s/cubeplex-sandbox:v%s" .Values.image.registry .Values.image.repository .Chart.AppVersion) | quote }}
        api_key: {{ $sandbox.api_key | quote }}
      llm:
        {{- toYaml $llm | nindent 8 }}
