apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-webhook
  namespace: opensandbox
  labels:
    app: egress-webhook
    app.kubernetes.io/part-of: cubeplex-egress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: egress-webhook
  template:
    metadata:
      labels:
        app: egress-webhook
        app.kubernetes.io/part-of: cubeplex-egress
    spec:
      serviceAccountName: egress-webhook
      containers:
        - name: webhook
          # Replace with the actual image built from deploy/kubernetes/egress-bundle/webhook/Dockerfile.
          image: REGISTRY_PLACEHOLDER/cubeplex-egress-webhook:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8443
              name: https
              protocol: TCP
          env:
            # The egress image the webhook uses to: (a) narrow-match sandbox pods
            # and (b) run the CA-trust initContainer.  Must match the OpenSandbox
            # server's configured egress.image value exactly.
            - name: EGRESS_IMAGE
              value: "EGRESS_IMAGE_PLACEHOLDER"
            # Full URL of the cubeplex exchange endpoint.  Injected into each
            # patched sidecar container so inject.py can reach the endpoint.
            - name: EGRESS_EXCHANGE_URL
              value: "https://egress-exchange.cubeplex.internal/api/v1/internal/egress/exchange"
            # TTL for per-sandbox mTLS client certs (minutes).  Must be longer
            # than the maximum expected sandbox lifetime.
            - name: CLIENT_CERT_TTL_MINUTES
              value: "720"
            # Path to the MITM CA private key (from egress-mitm-ca Secret).
            # The webhook uses this to sign per-sandbox client certs.
            - name: CA_KEY_PATH
              value: /etc/egress-mitm-ca/mitmproxy-ca.pem
            # Path to the MITM CA public cert (from egress-mitm-ca Secret).
            - name: CA_CERT_PATH
              value: /etc/egress-mitm-ca/mitmproxy-ca-cert.pem
            # Path to the CA cert that signed the exchange server's TLS cert.
            # The webhook embeds this in the per-sandbox client-cert Secret so
            # inject.py can verify the exchange endpoint's certificate.
            # In this bundle the egress MITM CA doubles as the exchange server CA
            # (same CA signs both the client certs and the exchange server cert).
            - name: EXCHANGE_CA_PATH
              value: /etc/egress-mitm-ca/ca-cert.pem
          volumeMounts:
            # egress-mitm-ca: CA key + cert for signing per-sandbox client certs.
            - name: egress-mitm-ca
              mountPath: /etc/egress-mitm-ca
              readOnly: true
            # webhook-tls: TLS cert+key for the webhook's own HTTPS server
            # (the cert that Kubernetes verifies via clientConfig.caBundle).
            - name: webhook-tls
              mountPath: /etc/webhook-tls
              readOnly: true
          args:
            - uvicorn
            - webhook.app:app
            - --host=0.0.0.0
            - --port=8443
            - --ssl-certfile=/etc/webhook-tls/tls.crt
            - --ssl-keyfile=/etc/webhook-tls/tls.key
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: egress-mitm-ca
          secret:
            secretName: egress-mitm-ca
        - name: webhook-tls
          secret:
            secretName: egress-webhook-tls
