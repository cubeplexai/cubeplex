# Base Configuration for cubebox
default:
  env: default
  debug: false

  # API Configuration
  api:
    host: "0.0.0.0"
    port: 8000
    reload: true

  # LLM Configuration
  # Note: For reasoning models, set reasoning config to enable reasoning output
  # Example: reasoning: {effort: "medium", summary: "auto"}
  llm:
    # Default model in "provider/model-id" format
    default_model: "cubebox/doubao-seed-1.8-thinking"

    # Fallback models tried in order when default_model fails (timeout/error)
    fallback_models:
      - "cubebox/qwen3.5-plus-thinking"

    # Model Providers Configuration
    providers:
      cubebox:
        base_url: "USE ENV"
        api_key: "USE ENV"
        api: "openai-completions"
        extra_body: {}
        extra_headers: {}
        models:
          - id: "qwen3.5-plus-thinking"
            name: "Qwen3.5 Plus"
            reasoning: true
            input: [ "text", "image" ]
            cost:
              input: 0.8
              output: 4.8
              cache_read: 0.08
              cache_write: 1
            context_window: 991000
            max_tokens: 64000
            extra_body: {}
            extra_headers: {}
          - id: "doubao-seed-1.8"
            name: "DouBao Seed 1.8"
            reasoning: false
            input: [ "text", "image" ]
            cost:
              input: 2.4
              output: 24
              cache_read: 0
              cache_write: 0
            context_window: 256000
            max_tokens: 64000
            extra_body: {}
            extra_headers: {}
          - id: "doubao-seed-1.8-thinking"
            name: "DouBao Seed 1.8 Reasoning"
            reasoning: true
            input: [ "text", "image" ]
            cost:
              input: 2.4
              output: 24
              cache_read: 0
              cache_write: 0
            context_window: 256000
            max_tokens: 64000
            extra_body: {}
            extra_headers: {}

          - id: "qwen3-max-2026-01-23"
            name: "Qwen3 Max 0123"
            reasoning: false
            input: [ "text" ]
            cost:
              input: 7
              output: 28
              cache_read: 0
              cache_write: 0
            context_window: 256000
            max_tokens: 32000
            extra_body: {}
            extra_headers: {}

  # Sandbox Configuration
  # Note: Sandbox lifecycle is managed by cubebox's SandboxManager (cleanup_expired task).
  # opensandbox timeout is set to None (disabled) — cubebox controls termination via TTL.
  sandbox:
    enabled: true
    # domain: "localhost:8090"
    domain: "@format {env[CUBEBOX_SANDBOX__DOMAIN]}"
    image: "@format {env[CUBEBOX_SANDBOX__IMAGE]}"
    api_key: "@format {env[CUBEBOX_SANDBOX__API_KEY]}"
    # use_server_proxy: Use sandbox server as proxy for execd/endpoint requests
    #   Set to true when SDK cannot directly reach sandbox network/ports
    #   (e.g., Docker bridge deployments, network isolation)
    use_server_proxy: true
    # ready_timeout: Maximum time to wait for sandbox to become ready after creation
    #   Used only during sandbox initialization. If the sandbox doesn't respond to
    #   health checks within this time, creation fails.
    ready_timeout: 60 # 60 seconds
    # request_timeout: HTTP request timeout for sandbox API calls
    #   Timeout for individual commands (execute, upload, download, etc.)
    request_timeout: 60 # 60 seconds
    # ttl: Sandbox idle timeout (time since last activity before cleanup)
    #   SandboxManager's background cleanup task periodically checks for sandboxes
    #   that have been inactive (no commands) for this duration and terminates them.
    ttl: 600 # 10 minutes in seconds
    cleanup_interval: 60 # Cleanup task interval in seconds
    workdir: "/workspace" # Default working directory for command execution
    # resource: CPU and memory limits for sandbox containers
    #   cpu: CPU limit (e.g., "100m" = 0.1 core, "1" = 1 core, "2" = 2 cores)
    #   memory: Memory limit (e.g., "100Mi", "512Mi", "2Gi", "4Gi")
    resource:
      cpu: "100m"
      memory: "100Mi"
    volume:
      enabled: true
      mount_path: "/workspace"
      pvc_prefix: "cubebox-user" # PVC naming: cubebox-user-{user_id[:8]}
    skills:
      enabled: true
      builtin_dir: "skills/builtin" # Relative to backend/
      container_path: "/.skills" # Container root path for skills
      sources:
        # Skill source paths passed to DeepAgents
        - "/.skills/builtin"

  # Memory Configuration
  memory:
    short_term_enabled: true
    long_term_enabled: false

  # MCP Configuration
  mcp:
    enabled: false
    servers: {}
    # Example with citation support:
    # servers:
    #   web-tools:
    #     transport: streamable_http
    #     url: "http://localhost:3001/mcp"
    #     tools:
    #       - name: web_search
    #         content_type: text
    #         citation:
    #           source_type: web
    #           content_field: "results"
    #           mapping:
    #             url: "link"
    #             title: "title"
    #             domain: "domain"
    #             snippet: "snippet"
    #             published_at: "date"
    #       - name: web_fetch
    #         content_type: text
    #         citation:
    #           source_type: web
    #           content_field: null
    #           mapping:
    #             snippet: "content"
    #           args_mapping:
    #             url: "url"
    #             title: "title"

  langsmith:
    enabled: true
    key: "@format {env[CUBEBOX_LANGSMITH__KEY]}"

  # Object Storage Configuration (S3-compatible)
  objectstore:
    provider: "oss" # "oss" or "s3"
    endpoint: "https://oss-cn-zhangjiakou.aliyuncs.com"
    bucket: "cubebox-dev"
    region: "cn-zhangjiakou"
    access_key: ""
    access_secret: ""

  # Database Configuration
  database:
    host: "localhost"
    port: 3306
    user: "root"
    password: ""
    name: "cubebox"
    pool_size: 10
    max_overflow: 20
    echo: false

  streaming:
    redis_url: "redis://localhost:6379/0"
    redis_key_prefix: "cubebox"
    run_event_ttl_seconds: 900
    run_stream_block_ms: 15000

  # Auth Configuration (P1)
  auth:
    jwt_secret: "CHANGE_ME_IN_PRODUCTION" # ENV: CUBEBOX_AUTH__JWT_SECRET
    jwt_lifetime_seconds: 86400 # 24h
    cookie_name: "cubebox_auth"
    cookie_secure: false # production: true
    cookie_samesite: "lax"
    csrf_secret: "CHANGE_ME_IN_PRODUCTION" # ENV: CUBEBOX_AUTH__CSRF_SECRET
    rate_limit:
      login_per_minute: 5
      register_per_minute: 3
