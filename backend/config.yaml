# Base Configuration for cubebox
default:
  env: default
  debug: false

  # Logging Configuration
  # When `debug: true` the root level is DEBUG, which captures every chatty
  # third-party logger (botocore/aiobotocore/httpcore/...) via the stdlib
  # intercept. `third_party_level` caps a known-noisy list at a higher level
  # by default. Per-module overrides go in `verbose_modules` (full or partial
  # logger names) for selectively re-enabling DEBUG.
  logging:
    third_party_level: "WARNING"
    verbose_modules: []
    # One loguru line per HTTP request (method, path, status, duration).
    # Health probes and OPTIONS preflights are always skipped. Set false to
    # silence access logging (e.g. behind a proxy that already logs requests).
    access_log: true

  # Deployment Configuration
  deployment:
    mode: single_tenant

  # API Configuration
  api:
    host: "0.0.0.0"
    port: 8000
    reload: true
    public_url: ""

  # Egress secret-injection exchange endpoint.
  #   auth.mode "mtls"  → production: identity is the CN of the per-sandbox
  #                       client cert, served on the dedicated mTLS listener.
  #   auth.mode "dev"   → bare-local shared secret (only allowed in
  #                       development/test envs); route mounted on the public app.
  egress_exchange:
    auth:
      mode: mtls
    # Dedicated mTLS listener (production). Disabled by default; the deployment
    # that runs the egress bundle enables it and points at the server cert/key
    # plus the egress CA that signed the per-sandbox client certs.
    listener:
      enabled: false
      host: "0.0.0.0"
      port: 8443
      certfile: ""
      keyfile: ""
      ca_certs: ""

  # LLM Configuration
  # Note: For reasoning models, set reasoning config to enable reasoning output
  # Example: reasoning: {effort: "medium", summary: "auto"}
  llm:
    # Tiered model presets seeded into the system OrgSettings.model_presets row.
    # Each tier carries a primary model ref ("provider/model-id") plus optional
    # fallbacks tried in order when the primary fails (timeout/error).
    model_presets:
      tiers:
        lite:  { enabled: true,  primary: "cubebox/doubao-seed-1.8-thinking", fallbacks: [] }
        flash: { enabled: false, primary: null, fallbacks: [] }
        pro:   { enabled: true,  primary: "cubebox/doubao-seed-1.8-thinking",
                 fallbacks: ["cubebox/qwen3.5-plus-thinking"] }
        max:   { enabled: false, primary: null, fallbacks: [] }
      default_preset: pro
      task_routing: {}

    # Model Providers Configuration
    providers:
      cubebox:
        base_url: "USE ENV"
        api_key: "USE ENV"
        api: "openai-completions"
        extra_body: {}
        extra_headers: {}
        models:
          - id: "qwen3.5-plus-thinking"
            name: "Qwen3.5 Plus"
            reasoning: true
            input: ["text", "image"]
            cost:
              input: 0.8
              output: 4.8
              cache_read: 0.08
              cache_write: 1
            context_window: 991000
            max_tokens: 64000
            extra_body: {}
            extra_headers: {}
          - id: "doubao-seed-1.8"
            name: "DouBao Seed 1.8"
            reasoning: false
            input: ["text", "image"]
            cost:
              input: 2.4
              output: 24
              cache_read: 0
              cache_write: 0
            context_window: 256000
            max_tokens: 64000
            extra_body: {}
            extra_headers: {}
          - id: "doubao-seed-1.8-thinking"
            name: "DouBao Seed 1.8 Reasoning"
            reasoning: true
            input: ["text", "image"]
            cost:
              input: 2.4
              output: 24
              cache_read: 0
              cache_write: 0
            context_window: 256000
            max_tokens: 64000
            extra_body: {}
            extra_headers: {}

          - id: "qwen3-max-2026-01-23"
            name: "Qwen3 Max 0123"
            reasoning: false
            input: ["text"]
            cost:
              input: 7
              output: 28
              cache_read: 0
              cache_write: 0
            context_window: 256000
            max_tokens: 32000
            extra_body: {}
            extra_headers: {}

  # Sandbox Configuration
  # Note: Sandbox lifecycle is managed by cubebox's SandboxManager (cleanup_expired task).
  # opensandbox timeout is set to None (disabled) — cubebox controls termination via TTL.
  sandbox:
    enabled: true
    # domain: "localhost:8090"
    domain: "@format {env[CUBEBOX_SANDBOX__DOMAIN]}"
    image: "@format {env[CUBEBOX_SANDBOX__IMAGE]}"
    api_key: "@format {env[CUBEBOX_SANDBOX__API_KEY]}"
    # use_server_proxy: Use sandbox server as proxy for execd/endpoint requests
    #   Set to true when SDK cannot directly reach sandbox network/ports
    #   (e.g., Docker bridge deployments, network isolation)
    use_server_proxy: true
    # secure_access: Whether to request OpenSandbox's signed-URL secured
    #   endpoint mode on create. Required for production-grade Kubernetes
    #   deployments behind the ingress gateway. Must be set to false when
    #   using docker-runtime OpenSandbox (the docker backend rejects
    #   secureAccess=True with HTTP 400 INVALID_PARAMETER). See
    #   deploy/docker-compose/OPENSANDBOX.md for context.
    secure_access: true
    # ready_timeout: Maximum time to wait for sandbox to become ready after creation
    #   Used only during sandbox initialization. If the sandbox doesn't respond to
    #   health checks within this time, creation fails.
    ready_timeout: 300 # 5 minutes — must cover a cold image pull
    # request_timeout: HTTP request timeout for sandbox API calls
    #   Timeout for individual commands (execute, upload, download, etc.)
    request_timeout: 60 # 60 seconds
    # create_timeout: HTTP timeout for the synchronous create call only. The server
    #   holds POST /sandboxes open until the pod is ready, so a cold image pull
    #   (minutes) blows past request_timeout. Kept separate so ordinary commands
    #   aren't forced to tolerate multi-minute hangs.
    create_timeout: 300 # 5 minutes
    # ttl: Sandbox idle timeout (time since last activity before cleanup)
    #   SandboxManager's background cleanup task periodically checks for sandboxes
    #   that have been inactive (no commands) for this duration and terminates them.
    #   Activity is refreshed at turn start (get_or_create reuse), turn end (release),
    #   and during the turn whenever LazySandbox is exercised — throttled by
    #   `touch_interval` so chatty execute/upload loops don't hammer the DB.
    ttl: 1800 # 30 minutes in seconds
    touch_interval: 60 # Min seconds between activity touches from LazySandbox
    cleanup_interval: 60 # Cleanup task interval in seconds
    # Pause/resume knobs (spec OQ-1/OQ-2/OQ-7).
    #   pause_on_idle: when true, idle sandboxes are paused (not killed) on
    #     capable providers; falls back to kill on incapable providers / failures.
    #     Disabled: OpenSandbox v1.0.12 pause (spec.pause=true) just deletes the
    #     pod without checkpointing — identical to kill. Re-enable once the
    #     provider supports real checkpoint/restore.
    #   idle_ttl_seconds: idle threshold for pause_idle (separate from ttl which
    #     governs the legacy kill path).
    #   paused_ttl_seconds: how long a paused sandbox lives before the reaper
    #     hard-kills it.
    #   lease_seconds: in-use lease window (LazySandbox acquire/renew/release).
    #   resume_timeout: max wait for the provider's resume call.
    pause_on_idle: false
    idle_ttl_seconds: 1800
    paused_ttl_seconds: 86400
    lease_seconds: 300
    resume_timeout: 30
    workdir: "/workspace" # Default working directory for command execution
    # resource: CPU and memory limits for sandbox containers
    #   cpu: CPU limit (e.g., "100m" = 0.1 core, "1" = 1 core, "2" = 2 cores)
    #   memory: Memory limit (e.g., "100Mi", "512Mi", "2Gi", "4Gi")
    resource:
      cpu: "2"
      memory: "4Gi"
    volume:
      enabled: true
      mount_path: "/workspace"
      pvc_prefix: "cubebox-user" # PVC naming: cubebox-user-{user_id[:8]}

  # Skill marketplace (M3) — catalog-driven; replaces filesystem-based skills loader.
  skills:
    cache_root: "skills_cache" # Local extraction cache for object-store-fetched skills
    preinstalled_dir: "skills/preinstalled" # Relative to backend/, seeded into the global catalog

  # Registry Configuration
  registry:
    skills_sh:
      github_token: ""  # optional: raises GitHub API rate limit 60→5000 req/h

  # Memory Configuration
  memory:
    short_term_enabled: true
    long_term_enabled: false

  # MCP connectors are managed via the DB-backed catalog (mcp_catalog_connectors)
  # plus per-org/per-workspace installs (mcp_servers). The legacy
  # `mcp.servers` config block was removed in M2.
  mcp:
    progressive_disclosure:
      enabled: "auto"        # "auto" | "on" | "off"
      threshold_pct: 10.0    # collapse when deferrable schemas >= this % of context
      min_servers: 2         # never collapse below this server count

  # Object Storage Configuration (S3-compatible)
  objectstore:
    provider: "oss" # "oss" or "s3"
    endpoint: "https://oss-cn-zhangjiakou.aliyuncs.com"
    bucket: "cubebox-dev"
    region: "cn-zhangjiakou"
    access_key: ""
    access_secret: ""

  # Database Configuration
  database:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: "postgres"
    name: "cubebox"
    pool_size: 10
    max_overflow: 20
    echo: false

  redis:
    url: "redis://:passwd@localhost:6379/0" # ENV: CUBEBOX_REDIS__URL
    key_prefix: "cubebox" # effective prefix is "{key_prefix}:{env}" at runtime
    # Connection pool / socket options passed to redis.asyncio.Redis.from_url
    max_connections: 64
    socket_timeout_seconds: 10
    socket_connect_timeout_seconds: 5
    socket_keepalive: true
    health_check_interval_seconds: 30
    retry_on_timeout: true

  streaming:
    # Retention for a completed run's meta + event log. Long enough that a
    # user can come back hours later and still replay; agents can also
    # legitimately run for a long time, so this doubles as the upper bound
    # on how long an in-flight run can stay active (active-run key TTL is
    # heartbeated up to this on every event append).
    run_event_ttl_seconds: 43200 # 12h
    # XREAD BLOCK time. MUST be strictly less than redis.socket_timeout_seconds
    # (in ms) — redis-py's socket_timeout applies to blocking commands too, and
    # a BLOCK longer than the socket timeout raises TimeoutError mid-read.
    # Doubles as the SSE heartbeat cadence when there are no events.
    run_stream_block_ms: 5000
    # DoS safety net only: XADD ~ MAXLEN. Trimming is silent data loss
    # (breaks replay / resume), so size this well above any realistic run.
    # Normal runs should be orders of magnitude smaller.
    run_stream_max_events: 1000000

  # Public-facing URLs used by OAuth redirect handling and other features
  # that mint absolute URLs for browsers / external IdPs.
  public_base_url: "http://localhost:8000" # ENV: CUBEBOX_PUBLIC_BASE_URL
  frontend_base_url: "http://localhost:3000" # ENV: CUBEBOX_FRONTEND_BASE_URL

  # Auth Configuration (P1)
  auth:
    jwt_secret: "CHANGE_ME_IN_PRODUCTION_NOT_SECURE" # ENV: CUBEBOX_AUTH__JWT_SECRET
    jwt_lifetime_seconds: 86400 # 24h
    cookie_name: "cubebox_auth"
    csrf_cookie_name: "cubebox_csrf"
    cookie_secure: false # production: true
    cookie_samesite: "lax"
    csrf_secret: "CHANGE_ME_IN_PRODUCTION_NOT_SECURE" # ENV: CUBEBOX_AUTH__CSRF_SECRET
    rate_limit:
      login_per_minute: 5
      register_per_minute: 3

  # Email (verification + password reset). `log` backend just prints the
  # rendered email to stdout (dev); `smtp` actually sends via aiosmtplib.
  # Put real credentials in gitignored config.*.local.yaml or env, not here.
  #   CUBEBOX_EMAIL__SMTP_PASSWORD / CUBEBOX_EMAIL__SMTP_USER / ...
  # TLS: leave `smtp_tls` unset for the common case — port 465 auto-uses
  # implicit TLS, anything else (e.g. 587) uses STARTTLS. Set `smtp_tls: true`
  # to force implicit TLS, or `smtp_tls: false` to disable it entirely
  # (plaintext relay, no STARTTLS).
  email:
    backend: "log" # "log" | "smtp"
    from_address: "noreply@cubebox.local"
    smtp_host: "localhost"
    smtp_port: 587
    # smtp_tls: true    # uncomment to force implicit TLS (port 465)
    smtp_user: ""
    smtp_password: ""

  # Social login (Google OAuth2/OIDC). The client_secret is NOT stored here;
  # operator seeds it into the Credential Vault as kind="social_login",
  # name="google", org_id=NULL.
  social_login:
    google:
      enabled: false
      client_id: "" # ENV: CUBEBOX_SOCIAL_LOGIN__GOOGLE__CLIENT_ID

  # File parsers (M6 file_read tool)
  parsers:
    docling_serve:
      base_url: "http://docling-serve:5001" # ENV: CUBEBOX_PARSERS__DOCLING_SERVE__BASE_URL
      api_key: "" # ENV: CUBEBOX_PARSERS__DOCLING_SERVE__API_KEY
      timeout_sync_seconds: 30
      timeout_async_minutes: 10
      async_threshold_mb: 3
      poll_interval_seconds: 2

  plugins:
    auth_provider:
      selected: null # null / "builtin" / "<plugin_name>"
    permission_checker:
      selected: null
    audit_sink:
      disabled: []
    user_directory_syncer:
      disabled: []
    admin_panel_extension:
      disabled: []

  # Attachments Configuration (M7 file upload)
  attachments:
    max_file_bytes: 52428800
    max_per_message: 10
    max_per_conversation_bytes: 524288000
    orphan_ttl_seconds: 3600
    cleanup_interval_seconds: 300
    allowed_mime_types:
      - image/png
      - image/jpeg
      - image/webp
      - image/gif
      - application/pdf
      - text/plain
      - text/markdown
      - text/csv
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - application/msword
      - application/vnd.ms-excel
      - application/vnd.ms-powerpoint
      - image/svg+xml
      - application/json
      - application/x-yaml
      - application/zip
      - application/x-zip-compressed
      - application/x-tar
      - application/x-bzip2
      - application/gzip

    thumbnail:
      max_long_edge: 256
      format: webp
      quality: 80
    view_images:
      max_long_edge: 1568
      jpeg_quality: 85
      max_decoded_long_edge: 16384
      batch_max: 8

  # Graceful Restart and Lifecycle Configuration
  lifecycle:
    graceful_drain_timeout_seconds: 3600
    dev_double_signal_force_exit: true
    stale_run_threshold_seconds: 120

  # Conversation context compaction (default on; threshold = model.context_window * ratio)
  # cubepi 0.x+: ``keep_tail_tokens`` (token budget) replaces the older
  # ``keep_recent_messages`` (message count). ``max_summary_tokens: null``
  # uses cubepi's dynamic budget — clamp(content*0.15, 1024, 4096); set
  # an int to pin the budget instead.
  compaction:
    enabled: true
    summary_provider: "deepseek"
    summary_model: "deepseek-v4-flash"
    threshold_ratio: 0.7
    keep_tail_tokens: 8000
    max_summary_tokens: null
    min_compact_messages: 4
    fallback_context_window: 128000

  # Image generation (generate_image tool, sandbox-gated).
  # Set enabled: true and supply a real api_key in config.*.local.yaml or via env
  # (CUBEBOX_IMAGE_GENERATION__API_KEY) to activate.  Never commit real keys here.
  image_generation:
    enabled: false
    api: "openai-images"
    model: "gpt-image-2"
    api_key: null
    base_url: null

  # cubepi agent tracing (OTLP/JSON spans on disk; default off; opt-in per env)
  # When enabled, each run writes <directory>/<YYYY-MM-DD>/<run_id>.jsonl.
  # Optionally also ship spans to an OTLP HTTP collector (e.g. Grafana Tempo)
  # by setting `otlp.endpoint` to the full /v1/traces URL.
  tracing:
    enabled: false
    directory: "./cubepi-traces"
    # record_content=true captures full prompts / responses / tool args+results
    # in the trace — useful for debugging, larger files, may contain sensitive data.
    record_content: false
    otlp:
      # Full OTLP HTTP traces URL, e.g. "http://localhost:4318/v1/traces".
      # Leave null to keep tracing JSONL-only.
      endpoint: null
      # Optional bearer / auth headers, as a flat dict of string→string.
      headers: null
      timeout_seconds: 10
    tempo:
      # HTTP query endpoint for Tempo (admin trace viewer reads from here).
      # Distinct from otlp.endpoint, which is the write path.
      # Leave null to disable the admin trace UI in this environment.
      query_endpoint: null
      timeout_seconds: 10

  # Conversation search (hybrid lexical + vector). See
  # docs/dev/specs/2026-06-11-conversation-search-design.md.
  search:
    enabled: true
    lexical:
      backend: "pgroonga"          # | "pg_bigm"
    embedding:
      # Explicit on/off. When false (default) the worker still indexes chunks
      # so PGroonga has rows to query, but skips embedding — search runs in
      # lexical-only mode. Flip to true after you fill in api_key + a model.
      enabled: false
      # OpenAI-compatible /v1/embeddings endpoint. Any backend that speaks
      # the OpenAI embeddings protocol works (DashScope compatible-mode,
      # local vLLM/Ollama, etc.). Override per-deployment.
      base_url: "https://api.openai.com/v1"
      # Leave empty here; supply via env (`CUBEBOX_SEARCH__EMBEDDING__API_KEY`)
      # or a gitignored .secrets.yaml. Dynaconf merges env over yaml.
      api_key: ""
      model: "text-embedding-3-small"
      # Vector column width in conversation_chunks.embedding. Frozen at
      # `alembic upgrade head` time — to change later, drop the table and
      # re-migrate. The startup three-way check (cubebox.services.
      # conversation_search.startup) catches drift between this, the live
      # schema, and the provider's actual output dim.
      vector_dim: 1024
      # `dimensions` parameter sent on the /v1/embeddings request. 0 means
      # "don't send it" — the model returns its native dim. Set to a positive
      # int to ask the provider to truncate (Matryoshka models +
      # text-embedding-3-* support this; many models do not). When non-zero,
      # must equal vector_dim.
      dimensions: 0
      batch_size: 32
      timeout_seconds: 30
    chunker:
      target_tokens: 600
      overlap_tokens: 100
    worker:
      poll_interval_seconds: 2
      max_attempts: 5
      backoff_seconds: [60, 300, 1500, 7200, 36000]
      # Jobs left in 'running' for longer than this (e.g. crashed worker)
      # are returned to 'pending' on next worker startup. Attempts bumps so
      # a permanently broken job still drops out via max_attempts.
      stuck_threshold_seconds: 1800
    rrf:
      k: 60
      prefetch_per_leg: 20
