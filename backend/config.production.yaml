# Production Configuration

dynaconf_merge: true
production:
  env: production

  debug: false

  # Deployment Configuration
  deployment:
    mode: multi_tenant
  
  api:
    reload: false
  
  # Sandbox Configuration for Production
  sandbox:
    enabled: true
    domain: "USE ENV"  # Set via SANDBOX_DOMAIN env var
    image: "USE ENV"   # Set via SANDBOX_IMAGE env var
    api_key: "USE ENV" # Set via SANDBOX_API_KEY env var

  # Auth (production overrides — secrets MUST come from env)
  auth:
    jwt_secret: "USE ENV"      # ENV: CUBEPLEX_AUTH__JWT_SECRET
    csrf_secret: "USE ENV"     # ENV: CUBEPLEX_AUTH__CSRF_SECRET
    cookie_secure: true
    password_policy: "high"
    email_verification:
      enabled: "auto"
      code_length: 6
      code_ttl_seconds: 600
      max_attempts: 5
      resend_cooldown_seconds: 60
      rate_limit_per_hour: 10
  