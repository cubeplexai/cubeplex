# Test Configuration for cubebox
# Used for E2E testing with real API calls

dynaconf_merge: true
test:
  env: test

  debug: true

  # API Configuration
  api:
    host: "127.0.0.1"
    port: 8001
    reload: false

  # Sandbox Configuration for Testing
  sandbox:
    enabled: true
    domain: "localhost:8090"
    image: "hub.sensedeal.vip/library/cubebox-sandbox:24.04-20260311"
