# Test Configuration for cubeplex
# Used by CI e2e and local e2e dev.
# All endpoints, keys, model ids are injected via environment variables.
# Real values are kept in GitHub Secrets (CI) or local .env (dev).

dynaconf_merge: true
test:
  env: test
  debug: true

  # M9: existing E2E + Playwright tests were authored under the v1
  # one-org-per-user assumption (auto-bootstrapped on register, no /setup
  # detour). Force multi_tenant in the test profile so the legacy register →
  # /w/{wsId} flow still works. Tests that need to exercise single_tenant
  # bootstrap explicitly override `app.state.deployment_mode = "single_tenant"`
  # on the test app instance (see fresh_db_unauth_client_single_tenant in
  # tests/e2e/conftest.py).
  deployment:
    mode: multi_tenant

  api:
    host: "127.0.0.1"
    port: 8001
    reload: false

  # LLM: provider / base_url / api_key / model id 全部通过 env 注入
  # 仓库内看不到真实 endpoint 或模型名
  llm:
    model_presets:
      tiers:
        lite:  { enabled: true,  primary: "@format e2e/{env[CUBEPLEX_E2E_LLM_MODEL_ID]}", fallbacks: [] }
        flash: { enabled: false, primary: null, fallbacks: [] }
        pro:   { enabled: true,  primary: "@format e2e/{env[CUBEPLEX_E2E_LLM_MODEL_ID]}", fallbacks: [] }
        max:   { enabled: false, primary: null, fallbacks: [] }
      default_preset: pro
      task_routing: {}
    providers:
      deepseek:
        base_url: https://api.deepseek.com/anthropic
        api_key: key-in-env
        api: anthropic-messages
        models:
          - id: deepseek-v4-pro
            name: "DeepSeek V4 Pro"
            input: [ "text" ]
            context_window: 64000
            max_tokens: 12000
            reasoning: true

      e2e:
        base_url: "@format {env[CUBEPLEX_E2E_LLM_BASE_URL]}"
        api_key: "@format {env[CUBEPLEX_E2E_LLM_API_KEY]}"
        api: openai-completions
        extra_body:
          user: "cubeplex-e2e"
        extra_headers: {}
        models:
          - id: "@format {env[CUBEPLEX_E2E_LLM_MODEL_ID]}"
            name: "E2E Model"
            input: [ "text", "image" ]
            context_window: 128000
            max_tokens: 32000
            reasoning: true

  # Sandbox 复用 base config.yaml 的 @format {env[CUBEPLEX_SANDBOX__*]} 模式
  sandbox:
    enabled: true

  # CI 里用 service containers，localhost 连接
  database:
    host: "127.0.0.1"
    port: 5432
    user: "postgres"
    password: "testpass"
    name: "cubeplex_test"

  # CI 启动的 redis:7-alpine 无密码，走 127.0.0.1。
  # 覆盖 base config.yaml 里带密码的本地 dev URL。
  redis:
    url: "redis://127.0.0.1:6379/0"

  logging:
    path: "/tmp/backend.log"

  # MCP: CI 无 webtools server
  mcp:
    enabled: false

  # ObjectStore: RustFS service container
  objectstore:
    provider: "s3"
    endpoint: "http://127.0.0.1:9000"
    bucket: "cubeplex-test"
    region: "us-east-1"
    access_key: "rustfsadmin"
    access_secret: "rustfsadmin"

  # Auth: relax rate limits so playwright e2e (multiple registrations from 127.0.0.1) don't hit 429
  auth:
    rate_limit:
      login_per_minute: 1000
      register_per_minute: 1000
    # Low policy + verification=auto (False, since email.backend=log) keep the
    # existing fixture suite green (fixtures use safe=False programmatic user
    # creation with weak passwords + unverified login). OTP + high-policy
    # behavior is exercised per-test via monkeypatch in test_register_otp_flow
    # / test_password_policy_e2e.
    password_policy: "low"
    email_verification:
      enabled: "auto"
      code_length: 6
      code_ttl_seconds: 600
      max_attempts: 5
      resend_cooldown_seconds: 60
      rate_limit_per_hour: 100

  # Parsers: docling-serve URL comes from DOCLING_URL env when running e2e.
  # Non-e2e unit tests use httpx MockTransport and never hit this URL.
  parsers:
    docling_serve:
      base_url: "http://localhost-test-no-hit"
      timeout_sync_seconds: 30
      timeout_async_minutes: 10
      async_threshold_mb: 3
      poll_interval_seconds: 2

  # Egress exchange: dev authenticator for e2e tests (deployment.mode is multi_tenant,
  # so the production guardrail in build_sidecar_authenticator is not triggered).
  egress_exchange:
    auth:
      mode: dev
      dev_token: "test-egress-token"

  # Graceful Restart: fast test values
  # NOTE: stale_run_threshold_seconds is intentionally NOT lowered here.
  # The route-level stale tests plant timestamps 600s in the past and the
  # unit tests pass an explicit `now=` kwarg, so a tight threshold buys
  # nothing — but a tight threshold DOES make the playwright chat-flow
  # test flaky, because CI has occasional >1s gaps between run creation
  # and stream subscribe. Inherit the prod default (120s) instead.
  lifecycle:
    graceful_drain_timeout_seconds: 5
    dev_double_signal_force_exit: false
