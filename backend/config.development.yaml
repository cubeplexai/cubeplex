# Development Configuration
dynaconf_merge: true
development:
  env: development

  debug: true

  api:
    reload: true

  # Graceful Restart: keep dev reload fast — uvicorn StatReload sends SIGTERM
  # on every file save, and the prod default of 3600s would block reload for
  # up to an hour if a chat is in flight. 5s lets clean post-completion
  # writes finish; anything still running gets cancelled.
  lifecycle:
    graceful_drain_timeout_seconds: 5

  # Sandbox Configuration for Development
  sandbox:
    enabled: true
    domain: "localhost:8090"
    image: "hub.sensedeal.vip/library/cubeplex-sandbox:24.04-20260616c"

  # Auth (development overrides)
  auth:
    cookie_secure: false
    password_policy: "high"
    email_verification:
      enabled: "auto"
      code_length: 6
      code_ttl_seconds: 600
      max_attempts: 5
      resend_cooldown_seconds: 60
      rate_limit_per_hour: 10

  # File parsers: local docling-serve (developer runs `docker compose up docling-serve`)
  parsers:
    docling_serve:
      base_url: "http://localhost:5001"

  # Tracing on by default in dev so local runs emit trace files.
  # To also ship spans to Grafana Tempo, set `tracing.otlp.endpoint` in
  # config.development.local.yaml (per-machine, not checked in).
  tracing:
    enabled: true
    record_content: true
