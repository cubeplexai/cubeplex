# Development Configuration
dynaconf_merge: true
development:
  env: development

  debug: true

  api:
    reload: true

  # Graceful Restart: keep dev reload fast — uvicorn StatReload sends SIGTERM
  # on every file save, and the prod default of 3600s would block reload for
  # up to an hour if a chat is in flight. 5s lets clean post-completion
  # writes finish; anything still running gets cancelled.
  lifecycle:
    graceful_drain_timeout_seconds: 5

  # Sandbox Configuration for Development
  sandbox:
    enabled: true
    domain: "localhost:8090"
    image: "hub.sensedeal.vip/library/cubebox-sandbox:24.04-20260311"

  # Auth (development overrides)
  auth:
    cookie_secure: false

  mcp:
    enabled: true
    servers:
      webtools:
        url: "http://localhost:8020/api/webtools"
        transport: streamable_http
        key: "Pu9bKu1h9yGd9slVf9c9ugxCYd7f3f0V=="
        tools:
          - name: web_search
            content_type: json
            citation:
              source_type: web
              content_field: "results"
              mapping:
                url: "url"
                title: "title"
                snippet: "description"
                published_at: "date"
          - name: web_fetch
            content_type: text
            citation:
              source_type: web
              content_field: null
              mapping:
                snippet: "text"
              args_mapping:
                url: "url"
                title: "title"

        enabled: true

  # File parsers: local docling-serve (developer runs `docker compose up docling-serve`)
  parsers:
    docling_serve:
      base_url: "http://localhost:5001"
