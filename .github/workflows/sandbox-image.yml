name: Sandbox container image

on:
  pull_request:
    paths:
      - "deploy/images/sandbox/**"
      - ".github/workflows/sandbox-image.yml"
  push:
    branches: [main]
    paths:
      - "deploy/images/sandbox/**"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

concurrency:
  group: sandbox-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build sandbox image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Stage fonts
        working-directory: deploy/images/sandbox
        run: ./stage-fonts.sh

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cubeplex-sandbox
          tags: type=raw,value=sha-${{ github.sha }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: deploy/images/sandbox
          file: deploy/images/sandbox/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cubeplex-sandbox
          cache-to: type=gha,mode=max,scope=cubeplex-sandbox
