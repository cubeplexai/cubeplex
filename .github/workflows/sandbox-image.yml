name: Sandbox container image

on:
  pull_request:
    paths:
      - "deploy/images/sandbox/**"
      - "scripts/image-tag.sh"
      - ".github/workflows/sandbox-image.yml"
  push:
    branches: [main]
    paths:
      - "deploy/images/sandbox/**"
      - "scripts/image-tag.sh"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

concurrency:
  group: sandbox-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build sandbox image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Read sandbox version
        id: version
        working-directory: deploy/images/sandbox
        run: |
          set -euo pipefail
          version=$(tr -d '[:space:]' < VERSION)
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stage fonts
        working-directory: deploy/images/sandbox
        run: ./stage-fonts.sh

      - name: Compute image tag
        id: tag
        env:
          TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: echo "image_tag=$(scripts/image-tag.sh "$TARGET_SHA" "$TARGET_BRANCH")" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reject an existing sandbox version tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/cubeplex-sandbox:sandbox-v${{ steps.version.outputs.version }}
        run: |
          if docker buildx imagetools inspect "$IMAGE" >/dev/null 2>&1; then
            echo "Refusing to overwrite existing immutable image tag: $IMAGE" >&2
            exit 1
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cubeplex-sandbox
          tags: |
            type=raw,value=${{ steps.tag.outputs.image_tag }}
            type=raw,value=sandbox-v${{ steps.version.outputs.version }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: deploy/images/sandbox
          file: deploy/images/sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cubeplex-sandbox
          cache-to: type=gha,mode=max,scope=cubeplex-sandbox
