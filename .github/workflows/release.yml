name: Container image release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v<semver> tag to promote
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  promote:
    name: Promote verified application images
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - name: Validate release inputs
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Read sandbox version
        id: sandbox
        run: |
          set -euo pipefail
          version=$(tr -d '[:space:]' < deploy/images/sandbox/VERSION)
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify repository versions
        run: scripts/check-version-consistency.sh "$RELEASE_TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release manifest
        id: promote
        run: |
          set -euo pipefail

          source_commit=$(git rev-parse HEAD)
          sandbox_image="ghcr.io/${IMAGE_OWNER}/cubeplex-sandbox:sandbox-v${{ steps.sandbox.outputs.version }}"
          manifest="release-manifest-${RELEASE_TAG}.yaml"

          printf 'release: %s\nsource_commit: %s\nimages:\n' "$RELEASE_TAG" "$source_commit" > "$manifest"

          # images.yml builds and pushes version-tagged images when triggered by
          # the same tag push; wait for them to appear (up to ~30 min)
          for target in backend frontend; do
            release="ghcr.io/${IMAGE_OWNER}/cubeplex-${target}:${RELEASE_TAG}"
            digest=""
            for attempt in $(seq 1 180); do
              if digest=$(docker buildx imagetools inspect "$release" --format '{{.Manifest.Digest}}' 2>/dev/null); then
                break
              fi
              echo "Waiting for $release (attempt $attempt/180)"
              sleep 10
            done
            [[ "$digest" == sha256:* ]]
            printf '  %s: ghcr.io/%s/cubeplex-%s@%s\n' "$target" "$IMAGE_OWNER" "$target" "$digest" >> "$manifest"
          done

          for attempt in $(seq 1 60); do
            if docker buildx imagetools inspect "$sandbox_image" >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for $sandbox_image (attempt $attempt/60)"
            sleep 10
          done
          docker buildx imagetools inspect "$sandbox_image" >/dev/null
          printf '  sandbox: %s\n' "$sandbox_image" >> "$manifest"
          cat "$manifest"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes
          gh release upload "$RELEASE_TAG" "${{ steps.promote.outputs.manifest }}" --clobber
