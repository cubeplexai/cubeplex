name: Container image release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v<semver> tag to promote
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  promote:
    name: Promote verified application images
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Validate release inputs
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Read sandbox version
        id: sandbox
        run: |
          set -euo pipefail
          version=$(tr -d '[:space:]' < deploy/images/sandbox/VERSION)
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify repository versions
        run: scripts/check-version-consistency.sh "$RELEASE_TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release manifest
        id: promote
        run: |
          set -euo pipefail

          source_commit=$(git rev-parse HEAD)
          sandbox_src="ghcr.io/${IMAGE_OWNER}/cubeplex-sandbox:sandbox-v${{ steps.sandbox.outputs.version }}"
          sandbox_release="ghcr.io/${IMAGE_OWNER}/cubeplex-sandbox:${RELEASE_TAG}"
          manifest="release-manifest-${RELEASE_TAG}.yaml"

          printf 'release: %s\nsource_commit: %s\nimages:\n' "$RELEASE_TAG" "$source_commit" > "$manifest"

          # images.yml builds and pushes version-tagged images when triggered by
          # the same tag push; wait for them to appear (up to ~30 min)
          for target in backend frontend; do
            release="ghcr.io/${IMAGE_OWNER}/cubeplex-${target}:${RELEASE_TAG}"
            digest=""
            for attempt in $(seq 1 180); do
              if digest=$(docker buildx imagetools inspect "$release" --format '{{.Manifest.Digest}}' 2>/dev/null); then
                break
              fi
              echo "Waiting for $release (attempt $attempt/180)"
              sleep 10
            done
            [[ "$digest" == sha256:* ]]
            printf '  %s: ghcr.io/%s/cubeplex-%s@%s\n' "$target" "$IMAGE_OWNER" "$target" "$digest" >> "$manifest"
          done

          # The sandbox image is built separately (sandbox-image.yml) and tagged
          # sandbox-v<version>. Wait for it, then promote it to the app version
          # tag so every service image shares one release version — no rebuild.
          for attempt in $(seq 1 60); do
            if docker buildx imagetools inspect "$sandbox_src" >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for $sandbox_src (attempt $attempt/60)"
            sleep 10
          done
          docker buildx imagetools inspect "$sandbox_src" >/dev/null
          docker buildx imagetools create --tag "$sandbox_release" "$sandbox_src"
          sandbox_digest=$(docker buildx imagetools inspect "$sandbox_release" --format '{{.Manifest.Digest}}')
          [[ "$sandbox_digest" == sha256:* ]]
          printf '  sandbox: ghcr.io/%s/cubeplex-sandbox@%s\n' "$IMAGE_OWNER" "$sandbox_digest" >> "$manifest"
          cat "$manifest"
          echo "manifest=$manifest" >> "$GITHUB_OUTPUT"

      - name: Package and publish Helm chart
        run: |
          set -euo pipefail
          chart_dir=deploy/kubernetes/charts/cubeplex
          # Bundle the vendored OpenSandbox umbrella. It has nested subcharts
          # (server + controller), so build its deps first, then the top chart.
          helm dependency update "$chart_dir/vendor/opensandbox"
          helm dependency update "$chart_dir"
          helm package "$chart_dir" --destination dist
          helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin <<<"${{ secrets.GITHUB_TOKEN }}"
          # Chart.version == release semver (check-version-consistency), so this
          # publishes oci://ghcr.io/<owner>/charts/cubeplex:<semver>. The chart's
          # default image tag is v<appVersion>, matching the images above.
          helm push dist/cubeplex-*.tgz "oci://ghcr.io/${IMAGE_OWNER}/charts"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes
          gh release upload "$RELEASE_TAG" "${{ steps.promote.outputs.manifest }}" --clobber
