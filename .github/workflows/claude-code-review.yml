name: Claude Code Review

# Comment-triggered (not auto on every push). Review only fires when a
# human leaves a PR comment starting with `/code-review` — the
# auto-on-synchronize behavior was costing ~$13 / 25 min per push of a
# WIP branch. The complementary `@claude` mention pattern (see
# claude.yml) still works for ad-hoc tasks; this workflow is reserved
# for the structured code-review plugin flow.
on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/code-review')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # `write` (not `read`) so the action's post step can publish the
      # buffered inline review comments via the review-comments API.
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Resolve PR head SHA
        # issue_comment fires on the default branch checkout by default;
        # we need to know the PR head ref to check out and (later) to
        # tell the action which commit to attach inline comments to.
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq .head.sha)
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Reviewing PR #$PR_NUMBER at $HEAD_SHA"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Surface the full tool-call stream so empty-buffer runs are
          # diagnosable. Drop this once the review is reliably posting.
          show_full_output: true
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Two config gotchas that together made earlier runs post nothing,
          # even after they produced real findings:
          #
          # 1. The `--comment` flag on the slash command. The plugin's
          #    commands/code-review.md (step 7) explicitly stops without
          #    posting unless `--comment` is passed.
          #
          # 2. The inline-comment MCP server is mounted by the action ONLY
          #    when the user's allowed-tools list contains a matching tool
          #    name (claude-code-action/src/mcp/install-mcp-server.ts ~138).
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.issue.number }}'
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment"'

      - name: Fallback — post review summary if inline-comment buffer is empty
        # Safety net for the case where the proper inline-comment path
        # above fails: still surface the SDK's final assistant text as a
        # single PR comment so a run that found something isn't silently
        # swallowed. Skipped when the buffer has entries (the action's
        # own post step will publish them as proper inline comments).
        if: always() && steps.claude-review.conclusion != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          OUTPUT_FILE: /home/runner/work/_temp/claude-execution-output.json
          BUFFER_FILE: /tmp/inline-comments-buffer.jsonl
        run: |
          set -euo pipefail
          if [ -s "$BUFFER_FILE" ]; then
            echo "Inline-comment buffer has entries — skipping fallback summary."
            exit 0
          fi
          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "No execution output file at $OUTPUT_FILE — skipping fallback summary."
            exit 0
          fi
          RESULT_TEXT=$(jq -r '.result // empty' "$OUTPUT_FILE")
          if [ -z "$RESULT_TEXT" ]; then
            echo "No .result text in SDK output — likely an api_error before completion."
            exit 0
          fi
          {
            echo "## :robot: Claude Code Review (fallback summary)"
            echo ""
            echo "<sub>The inline-comment MCP server returned no buffered comments; this is the SDK's final text output.</sub>"
            echo ""
            printf '%s\n' "$RESULT_TEXT"
          } > /tmp/review-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/review-comment.md
