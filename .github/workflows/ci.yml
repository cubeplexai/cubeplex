name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend Check (ruff + mypy + pytest unit)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          # Ephemeral runner — skip post-run `uv cache prune --ci`
          # which occasionally hangs on a concurrent lock and fails the job.
          prune-cache: false
      - name: Install backend
        run: make backend-install
      - name: Backend CI checks
        env:
          # Dummy env vars required because tests/conftest.py forces ENV_FOR_DYNACONF=test
          # which loads config.test.yaml, and that file uses @format {env[...]} for secrets.
          # Without these, dynaconf raises DynaconfFormatError during test collection.
          # Real e2e job (Task 9) overrides these with GitHub Secrets.
          CUBEBOX_E2E_LLM_BASE_URL: http://dummy
          CUBEBOX_E2E_LLM_API_KEY: dummy
          CUBEBOX_E2E_LLM_MODEL_ID: dummy
          CUBEBOX_SANDBOX__DOMAIN: dummy:9000
          CUBEBOX_SANDBOX__IMAGE: dummy:image
          CUBEBOX_SANDBOX__API_KEY: dummy
        run: make backend-check-ci
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-check:
    name: Frontend Check (eslint + prettier + type-check + vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend
        run: make frontend-install
      - name: Frontend CI checks
        run: make frontend-check-ci

  e2e:
    name: E2E (backend pytest + frontend playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ENV_FOR_DYNACONF: test
      CUBEBOX_E2E_LLM_BASE_URL: ${{ secrets.CUBEBOX_E2E_LLM_BASE_URL }}
      CUBEBOX_E2E_LLM_API_KEY: ${{ secrets.CUBEBOX_E2E_LLM_API_KEY }}
      CUBEBOX_E2E_LLM_MODEL_ID: ${{ secrets.CUBEBOX_E2E_LLM_MODEL_ID }}
      CUBEBOX_SANDBOX__DOMAIN: ${{ secrets.CUBEBOX_SANDBOX__DOMAIN }}
      CUBEBOX_SANDBOX__IMAGE: ${{ secrets.CUBEBOX_SANDBOX__IMAGE }}
      CUBEBOX_SANDBOX__API_KEY: ${{ secrets.CUBEBOX_SANDBOX__API_KEY }}
      # Test-only Fernet key for CI startup and vault E2E. Production must set its own key.
      CUBEBOX_AUTH__VAULT_KEY: 1EwVRAtWccVJhdXX_2iepp7OlPfadfHpWNwVFpRzLBI=
      # Frontend proxies to local backend:8001 (matches config.test.yaml)
      CUBEBOX_API_URL: http://127.0.0.1:8001
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: cubebox_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          # Ephemeral runner — skip post-run `uv cache prune --ci`
          # which occasionally hangs on a concurrent lock and fails the job.
          prune-cache: false
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install backend
        run: make backend-install

      - name: Install frontend
        run: make frontend-install

      - name: Build @cubebox/core
        run: make frontend-build-core

      - name: Prepare RustFS data dirs
        run: |
          mkdir -p /tmp/rustfs/data /tmp/rustfs/logs
          sudo chown -R 10001:10001 /tmp/rustfs

      - name: Start RustFS
        run: |
          docker run -d --name rustfs \
            -p 9000:9000 -p 9001:9001 \
            -v /tmp/rustfs/data:/data \
            -v /tmp/rustfs/logs:/logs \
            rustfs/rustfs:1.0.0-alpha.97
          # TCP/HTTP-level readiness; RustFS alpha lacks a unified /health endpoint.
          # Accept any 2xx/3xx/4xx HTTP response as ready.
          for i in {1..30}; do
            if curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9000/ | grep -qE '^(2|3|4)'; then
              echo "RustFS ready"
              break
            fi
            sleep 2
          done

      - name: Create RustFS test bucket
        env:
          AWS_ACCESS_KEY_ID: rustfsadmin
          AWS_SECRET_ACCESS_KEY: rustfsadmin
        run: |
          aws --endpoint-url http://127.0.0.1:9000 \
            s3 mb s3://cubebox-test --region us-east-1

      - name: Alembic migrate (pre-pytest)
        run: make backend-migrate

      - name: Pytest e2e (in-process TestClient)
        run: make backend-test-e2e

      - name: Reset DB state for playwright
        # pytest may leave data behind; drop + recreate + migrate for a clean playwright start.
        run: |
          PGPASSWORD=testpass psql -h 127.0.0.1 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'cubebox_test';" \
            -c "DROP DATABASE IF EXISTS cubebox_test;" \
            -c "CREATE DATABASE cubebox_test;"
          make backend-migrate

      - name: Start backend in background
        run: |
          nohup make backend-start > /tmp/backend-console.log 2>&1 &

      - name: Wait for backend ready
        run: |
          timeout 60 bash -c '
            until curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/docs | grep -qE "^(2|3|4)"; do
              sleep 2
            done
          '

      - name: Install playwright browsers
        run: make frontend-install-browsers

      - name: Playwright e2e
        run: make frontend-test-e2e-ci

      - name: Cleanup leftover test sandboxes
        if: always()
        run: make backend-cleanup-sandboxes

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log

      - name: Upload playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            frontend/test-results/
            frontend/playwright-report/

  test-ee-compat:
    name: EE Compat (Layer 1 contract tests)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [backend-check]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install backend
        run: make backend-install
      - name: Run plugin contract tests
        env:
          # Contract tests don't touch LLM/sandbox/DB but tests/conftest.py
          # loads the full config which requires these env vars (see backend-check).
          CUBEBOX_E2E_LLM_BASE_URL: http://dummy
          CUBEBOX_E2E_LLM_API_KEY: dummy
          CUBEBOX_E2E_LLM_MODEL_ID: dummy
          CUBEBOX_SANDBOX__DOMAIN: dummy:9000
          CUBEBOX_SANDBOX__IMAGE: dummy:image
          CUBEBOX_SANDBOX__API_KEY: dummy
        run: make backend-test-contracts

  test-ee-compat-cross-repo:
    name: EE Compat Cross-Repo (Layer 2 placeholder)
    # Enable once cubebox-ee repo exists and has integration tests.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with: { path: cubebox }
      - uses: actions/checkout@v5
        with:
          repository: cubebox/cubebox-ee
          path: cubebox-ee
          token: ${{ secrets.EE_REPO_READ_TOKEN }}
      - uses: astral-sh/setup-uv@v6
      - name: Install CE from working tree + EE
        run: |
          cd cubebox-ee
          uv pip install -e ../cubebox/backend
          uv pip install -e .
      - name: Run EE smoke tests
        working-directory: cubebox-ee
        run: uv run pytest
