name: Container images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: Push images to registry
        type: boolean
        default: false

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Determine image targets
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      egress_webhook: ${{ steps.detect.outputs.egress_webhook }}
      image_tag: ${{ steps.detect.outputs.image_tag }}
      publish: ${{ steps.detect.outputs.publish }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed image areas
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_SHA: ${{ github.sha }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          publish=false
          if [[ "$EVENT_NAME" == "push" ]]; then
            image_tag="$TARGET_BRANCH"
            publish=true
          else
            image_tag=$(scripts/image-tag.sh "$TARGET_SHA" "$TARGET_BRANCH")
            publish="${{ inputs.publish }}"
          fi

          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"
          echo "egress_webhook=true" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "backend=true frontend=true tag=$image_tag publish=$publish"

  build:
    name: Build ${{ matrix.target }} image
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [backend, frontend, egress-webhook]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - uses: astral-sh/setup-uv@v6
        if: matrix.target == 'backend'
        with:
          python-version: "3.12"
          enable-cache: true
          prune-cache: false

      - name: Generate frozen backend requirements
        if: matrix.target == 'backend'
        working-directory: backend
        run: |
          uv export \
            --format requirements-txt \
            --no-hashes --no-dev --no-editable --no-emit-project \
            > requirements-frozen.txt

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: needs.changes.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cubeplex-${{ matrix.target }}
          tags: type=raw,value=${{ needs.changes.outputs.image_tag }}

      - name: Select Dockerfile
        id: dockerfile
        run: |
          if [[ "${{ matrix.target }}" == "egress-webhook" ]]; then
            echo "path=deploy/kubernetes/egress-bundle/webhook/Dockerfile" >> "$GITHUB_OUTPUT"
          else
            echo "path=deploy/images/${{ matrix.target }}/Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          platforms: linux/amd64,linux/arm64
          push: ${{ needs.changes.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cubeplex-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=cubeplex-${{ matrix.target }}
