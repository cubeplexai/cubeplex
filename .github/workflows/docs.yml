name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      pages_branch:
        description: Cloudflare Pages preview branch to publish
        required: true
        default: preview
        type: string
permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build and check docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.10.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/site/pnpm-lock.yaml

      - name: Install docs dependencies
        working-directory: docs/site
        run: pnpm install --frozen-lockfile

      - name: Build and type-check docs
        working-directory: docs/site
        run: pnpm check

      - name: Upload docs build
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-build
          path: docs/site/build/
          if-no-files-found: error

  deploy-cloudflare:
    name: Deploy docs to Cloudflare Pages
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build-and-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - uses: actions/download-artifact@v8
        with:
          name: docs-site-build
          path: docs/site/build/

      - name: Deploy docs preview to Cloudflare Pages
        if: github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy docs/site/build --project-name=cubeplex-docs --branch=${{ github.event.inputs.pages_branch }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy docs production to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy docs/site/build --project-name=cubeplex-docs --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
