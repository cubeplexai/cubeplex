services:
  docling-models:
    image: ${DOCLING_REGISTRY:-ghcr.io/docling-project}/docling-serve-cpu:${DOCLING_CPU_TAG:-v1.16.1}
    container_name: docling-models
    restart: "no"
    command:
      - sh
      - -lc
      - >-
        set -eu;
        ready_flag=/models/.docling-models-ready-v1.16.1;
        smolvlm_dir=/models/HuggingFaceTB--SmolVLM-256M-Instruct;
        granite_dir=/models/ibm-granite--granite-docling-258M;
        if [ -f "$$ready_flag" ] &&
           [ -f "$$smolvlm_dir/config.json" ] &&
           [ -f "$$smolvlm_dir/model.safetensors" ] &&
           [ -f "$$smolvlm_dir/onnx/embed_tokens.onnx" ] &&
           [ -f "$$smolvlm_dir/onnx/decoder_model_merged_q4.onnx" ] &&
           [ -f "$$granite_dir/config.json" ] &&
           [ -f "$$granite_dir/model.safetensors" ]; then
          echo "All required Docling models already present in /models";
          exit 0;
        fi;
        rm -f "$$ready_flag";
        docling-tools models download --output-dir /models;
        docling-tools models download-hf-repo --output-dir /models HuggingFaceTB/SmolVLM-256M-Instruct;
        docling-tools models download-hf-repo --output-dir /models ibm-granite/granite-docling-258M;
        test -f "$$smolvlm_dir/config.json";
        test -f "$$smolvlm_dir/model.safetensors";
        test -f "$$smolvlm_dir/onnx/embed_tokens.onnx";
        test -f "$$smolvlm_dir/onnx/decoder_model_merged_q4.onnx";
        test -f "$$granite_dir/config.json";
        test -f "$$granite_dir/model.safetensors";
        touch "$$ready_flag"
    volumes:
      - /opt/docling-serve/models:/models

  docling-serve-cpu:
    profiles: ["cpu"]
    image: ${DOCLING_REGISTRY:-ghcr.io/docling-project}/docling-serve-cpu:${DOCLING_CPU_TAG:-v1.16.1}
    container_name: docling-serve-cpu
    restart: unless-stopped
    command:
      - docling-serve
      - run
      - --host
      - 0.0.0.0
      - --port
      - "5001"
      - --workers
      - "1"
    depends_on:
      docling-models:
        condition: service_completed_successfully
    ports:
      - "${DOCLING_CPU_PORT:-5001}:5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_ARTIFACTS_PATH: /models
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: "true"
      DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG: "true"
      DOCLING_SERVE_ALLOWED_VLM_ENGINES: '["api","api_openai","api_ollama","api_lmstudio"]'
    volumes:
      - /opt/docling-serve/models:/models
      - /opt/docling-serve/cpu/cache:/opt/app-root/src/.cache

  docling-serve-cu130:
    profiles: ["gpu"]
    image: ${DOCLING_REGISTRY:-ghcr.io/docling-project}/docling-serve-cu130:${DOCLING_CU130_TAG:-v1.16.1}
    container_name: docling-serve-cu130
    restart: unless-stopped
    command:
      - docling-serve
      - run
      - --host
      - 0.0.0.0
      - --port
      - "5001"
      - --workers
      - "1"
    depends_on:
      docling-models:
        condition: service_completed_successfully
    ports:
      - "${DOCLING_CU130_PORT:-5002}:5001"
    environment:
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_ARTIFACTS_PATH: /models
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: "true"
      DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG: "true"
      DOCLING_SERVE_ALLOWED_VLM_ENGINES: '["api","api_openai","api_ollama","api_lmstudio"]'
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    volumes:
      - /opt/docling-serve/models:/models
      - /opt/docling-serve/cu130/cache:/opt/app-root/src/.cache
    runtime: nvidia
