<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d9eff"/>
      <stop offset="100%" stop-color="#0061C2"/>
    </linearGradient>
    <linearGradient id="left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052a3"/>
      <stop offset="100%" stop-color="#003d7a"/>
    </linearGradient>
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0061C2"/>
      <stop offset="100%" stop-color="#004889"/>
    </linearGradient>
  </defs>
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon points="16,4 28,10 16,16 4,10" fill="url(#top)"/>
  <!-- Left face -->
  <polygon points="4,10 16,16 16,28 4,22" fill="url(#left)"/>
  <!-- Right face -->
  <polygon points="28,10 16,16 16,28 28,22" fill="url(#right)"/>
  <!-- Inner box hint / depth effect -->
  <polygon points="16,10 22,13 16,16 10,13" fill="#003366" opacity="0.3"/>
</svg>